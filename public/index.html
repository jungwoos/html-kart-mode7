<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HTML 카트 (Mode 7)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:#fff;
    touch-action:none; user-select:none; -webkit-user-select:none; }
  #game { position:fixed; inset:0; display:block; width:100%; height:100%; background:#111; }

  /* HUD */
  #hud { position:fixed; top:8px; left:8px; right:8px; display:flex; justify-content:space-between;
    pointer-events:none; font-weight:700; text-shadow:0 2px 4px rgba(0,0,0,.7); }
  #hud .box { background:rgba(0,0,0,.35); padding:6px 10px; border-radius:10px; line-height:1.3; }
  #speedo { font-size:22px; } #speedo small { font-size:12px; opacity:.8; }
  #laps { font-size:16px; } #status { font-size:12px; opacity:.85; }
  #mini { position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    width:96px; height:96px; border-radius:10px; border:2px solid rgba(255,255,255,.5);
    background:rgba(0,0,0,.3); }
  #banner { position:fixed; top:38%; left:0; right:0; text-align:center; font-size:42px;
    font-weight:900; color:#ffd23f; text-shadow:0 3px 10px rgba(0,0,0,.7); pointer-events:none; }

  /* 터치 컨트롤 */
  .ctl { position:fixed; bottom:0; display:flex; gap:12px; padding:18px; pointer-events:none; }
  #ctlLeft { left:0; } #ctlRight { right:0; }
  .btn { pointer-events:auto; width:78px; height:78px; border-radius:50%;
    background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.35);
    color:#fff; font-size:30px; font-weight:800; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px); }
  .btn:active, .btn.on { background:rgba(255,255,255,.4); }
  #gas { background:rgba(80,220,120,.3); border-color:rgba(120,255,160,.6); }
  #brake { background:rgba(255,90,90,.3); border-color:rgba(255,140,140,.6); }
  .hide { display:none !important; }

  /* 시작 화면 */
  #menu { position:fixed; inset:0; background:linear-gradient(160deg,#1a2a6c,#b21f1f,#1a2a6c);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; text-align:center; }
  #menu h1 { font-size:30px; letter-spacing:1px; }
  #menu p { font-size:13px; opacity:.9; max-width:520px; line-height:1.5; }
  .modes { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px; }
  .mode { padding:12px 16px; border-radius:12px; border:2px solid rgba(255,255,255,.4);
    background:rgba(0,0,0,.25); font-weight:700; cursor:pointer; font-size:15px; }
  .mode.sel { background:#fff; color:#1a2a6c; }
  .bigbtn { margin-top:8px; padding:14px 30px; font-size:18px; font-weight:800; border:none; border-radius:14px;
    background:#ffd23f; color:#222; cursor:pointer; }
  #menu input { padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,.4);
    background:rgba(0,0,0,.3); color:#fff; font-size:14px; }
  #menu input::placeholder { color:rgba(255,255,255,.55); }
  .mp { margin-top:12px; border-top:1px solid rgba(255,255,255,.25); padding-top:12px;
    width:100%; max-width:520px; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .mprow { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .small { font-size:12px; opacity:.85; }
  #warn { color:#ffd23f; font-weight:700; }
  #orient { position:fixed; inset:0; background:rgba(0,0,0,.92); display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; font-size:18px; z-index:50; }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud" class="hide">
    <div class="box" id="laps">LAP 1/3<br><span id="laptime">0.00</span></div>
    <div class="box" id="speedo">0<small> km/h</small></div>
    <div class="box" id="status">—</div>
  </div>
  <canvas id="mini" width="96" height="96" class="hide"></canvas>
  <div id="banner" class="hide">🏁 FINISH!</div>

  <!-- 터치/기울기 모드용 조향·가속 버튼 -->
  <div id="ctlLeft" class="ctl hide">
    <div class="btn" id="steerL">◀</div>
    <div class="btn" id="steerR">▶</div>
  </div>
  <div id="ctlRight" class="ctl hide">
    <div class="btn" id="brake">⏹</div>
    <div class="btn" id="gas">▲</div>
  </div>

  <!-- 시작 메뉴 -->
  <div id="menu">
    <h1>🏎️ HTML 카트 — Mode 7</h1>
    <p>조작 방식을 고르고 출발하세요. 게임패드는 블루투스로 페어링 후 자동 인식됩니다.</p>
    <div class="modes">
      <div class="mode" data-mode="gamepad">🎮 게임패드</div>
      <div class="mode sel" data-mode="tilt">📱 기울기(핸들)</div>
      <div class="mode" data-mode="touch">👆 터치</div>
    </div>
    <p id="warn"></p>
    <button class="bigbtn" id="startBtn">센서 켜기 · 보정 후 출발 ▶</button>
    <p class="small">기울기 모드: 출발 시 폰을 평소 잡는 자세로 들면 그 각도가 0점이 됩니다.<br>
    좌우로 기울이면 핸들처럼 커브가 돕니다. 가속/브레이크는 화면 버튼.</p>
    <p class="small" id="gpStatus">게임패드: 미연결</p>

    <!-- 멀티플레이 -->
    <div class="mp">
      <p class="small">🌐 멀티플레이 — 같은 <b>방 코드</b>를 입력하면 함께 달립니다 (최대 8명)</p>
      <div class="mprow">
        <input id="mpName" placeholder="닉네임" value="Player" maxlength="16" style="width:130px">
        <input id="mpRoom" placeholder="방 코드" value="room1" maxlength="24" style="width:130px">
      </div>
      <button class="bigbtn" id="mpBtn" style="background:#4fc3f7;">🌐 멀티로 출발</button>
      <p class="small" id="mpStatus"></p>
    </div>
  </div>

  <!-- 세로모드 경고 -->
  <div id="orient">📱➡️ 가로로 돌려 주세요</div>

<script>
"use strict";
/* ============================================================
   HTML 카트 — Mode 7 유사 3D 레이서
   입력: 게임패드(Gamepad API) / 기울기(DeviceOrientation) / 터치
   주의: 기울기 센서는 HTTPS 또는 localhost(secure context)에서만 동작.
   ============================================================ */

// ---------- 캔버스 / 내부 버퍼 ----------
const display = document.getElementById('game');
const dctx = display.getContext('2d');
const IW = 320, IH = 180;                 // 내부 렌더 해상도(저해상→확대)
const HORIZON = 64;                        // 지평선 y
const buf = document.createElement('canvas'); buf.width = IW; buf.height = IH;
const bctx = buf.getContext('2d');
const screenImg = bctx.createImageData(IW, IH);
const sd = screenImg.data;

function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  display.width = Math.floor(window.innerWidth*dpr);
  display.height = Math.floor(window.innerHeight*dpr);
  dctx.imageSmoothingEnabled = false;
  checkOrient();
}
window.addEventListener('resize', resize);

function checkOrient(){
  const o = document.getElementById('orient');
  const portrait = window.innerHeight > window.innerWidth * 1.1;
  o.style.display = (running && portrait) ? 'flex' : 'none';
}

// ---------- 트랙 맵(탑다운) 생성 ----------
const MAP = 2048;                          // 확장된 큰 맵
const map = document.createElement('canvas'); map.width = MAP; map.height = MAP;
const mctx = map.getContext('2d');
let mapData;                               // 색상 샘플(렌더용)
let surf;                                  // Uint8Array: 0풀 1도로 2연석 3가드레일
let miniBg = null;                         // 미니맵 배경(축소 이미지)

const ROAD_W = 176, CURB_W = 206, RAIL_W = 236;   // 도로/연석/가드레일 폭(넉넉하게)

// 도로 중심선 경로(맵 좌표). 닫힌 루프 — 더 길고 굴곡 많은 트랙.
const PATH = [
  [420,640],[820,440],[1280,520],[1620,380],[1820,700],
  [1660,1060],[1300,1020],[1520,1400],[1240,1660],[820,1680],
  [560,1440],[780,1120],[440,980],[300,740]
];
// Chaikin 코너 컷 — 닫힌 폴리라인을 여러 번 다듬어 코너 반경을 크게(주행성 ↑)
function chaikin(pts, iters){
  let p = pts.map(a=>a.slice());
  for(let k=0;k<iters;k++){
    const q=[];
    for(let i=0;i<p.length;i++){
      const a=p[i], b=p[(i+1)%p.length];
      q.push([a[0]*0.75+b[0]*0.25, a[1]*0.75+b[1]*0.25]);
      q.push([a[0]*0.25+b[0]*0.75, a[1]*0.25+b[1]*0.75]);
    }
    p=q;
  }
  return p;
}
const SPATH = chaikin(PATH, 4);                      // 부드러운 주행 라인(렌더+충돌 공용)
const FINISH = { x:SPATH[0][0], y:SPATH[0][1] };     // 결승선(매끈한 라인의 시작점)
const CHECK  = { x:1520, y:1400 };                   // 반대편 체크포인트
const START_H = Math.atan2(SPATH[1][1]-SPATH[0][1], SPATH[1][0]-SPATH[0][0]);

function tracePath(ctx){
  ctx.beginPath();
  ctx.moveTo(SPATH[0][0],SPATH[0][1]);
  for(let i=1;i<SPATH.length;i++) ctx.lineTo(SPATH[i][0],SPATH[i][1]);
  ctx.closePath();
}

function buildTrack(){
  // --- 잔디(줄무늬 + 점 질감) ---
  for(let y=0;y<MAP;y+=64){
    mctx.fillStyle = ((y>>6)&1) ? '#3f9e3f' : '#379237';
    mctx.fillRect(0,y,MAP,64);
  }
  mctx.fillStyle='rgba(0,0,0,0.05)';
  for(let i=0;i<8000;i++){ mctx.fillRect(Math.random()*MAP,Math.random()*MAP,3,3); }

  mctx.lineJoin='round'; mctx.lineCap='round';
  const stroke=(w,c)=>{ tracePath(mctx); mctx.lineWidth=w; mctx.strokeStyle=c; mctx.stroke(); };

  // --- 가드레일(바깥 회색 띠 + 기둥 무늬) ---
  stroke(RAIL_W, '#9aa0a6');
  mctx.setLineDash([12,28]); stroke(RAIL_W, '#41464c'); mctx.setLineDash([]);
  // --- 연석(흰 바탕 + 빨강 럼블) ---
  stroke(CURB_W, '#f2f2f2');
  mctx.setLineDash([26,26]); stroke(CURB_W, '#e23b3b'); mctx.setLineDash([]);
  // --- 아스팔트 ---
  stroke(ROAD_W, '#54595f');
  // --- 중앙 점선 ---
  mctx.setLineDash([34,30]); stroke(6, '#f4e58a'); mctx.setLineDash([]);
  // --- 결승선 ---
  drawChecker(FINISH.x, FINISH.y, SPATH[1]);

  mapData = mctx.getImageData(0,0,MAP,MAP).data;

  // --- 노면 분류 마스크(플랫 컬러로 별도 렌더 후 읽기) ---
  const sc = document.createElement('canvas'); sc.width=MAP; sc.height=MAP;
  const sx = sc.getContext('2d');
  sx.lineJoin='round'; sx.lineCap='round';
  sx.fillStyle='#000'; sx.fillRect(0,0,MAP,MAP);                 // 풀
  const ss=(w,c)=>{ tracePath(sx); sx.lineWidth=w; sx.strokeStyle=c; sx.stroke(); };
  ss(RAIL_W, '#f00'); ss(CURB_W, '#0f0'); ss(ROAD_W, '#00f');    // 레일/연석/도로
  const sdata = sx.getImageData(0,0,MAP,MAP).data;
  surf = new Uint8Array(MAP*MAP);
  for(let i=0,j=0;i<surf.length;i++,j+=4){
    const r=sdata[j], g=sdata[j+1], b=sdata[j+2];
    surf[i] = b>180?1 : g>180?2 : r>180?3 : 0;
  }

  // --- 미니맵 배경 ---
  miniBg = document.createElement('canvas'); miniBg.width=96; miniBg.height=96;
  miniBg.getContext('2d').drawImage(map,0,0,MAP,MAP,0,0,96,96);
}

function drawChecker(x,y,next){
  const ang = Math.atan2(next[1]-y, next[0]-x) + Math.PI/2;
  mctx.save(); mctx.translate(x,y); mctx.rotate(ang);
  const w=ROAD_W, h=26, c=10, cw=w/c;
  for(let i=0;i<c;i++){
    mctx.fillStyle = (i%2)?'#fff':'#111'; mctx.fillRect(-w/2+i*cw,-h/2,cw,h/2);
    mctx.fillStyle = (i%2)?'#111':'#fff'; mctx.fillRect(-w/2+i*cw,0,cw,h/2);
  }
  mctx.restore();
}

// 노면 코드 (경계 밖 = 풀=0). 1도로 2연석 3가드레일
function surfCode(x,y){
  if(x<0||y<0||x>=MAP||y>=MAP) return 0;
  return surf[(y|0)*MAP + (x|0)];
}
function drivable(x,y){ const c=surfCode(x,y); return c===1 || c===2; }

// ---------- Mode 7 렌더 ----------
const CAM_H = 90;     // 카메라 높이(픽셀)
const FOCAL = 140;    // 초점거리 느낌
function renderMode7(camX, camY, heading){
  const cosA = Math.cos(heading), sinA = Math.sin(heading);
  // 하늘
  for(let y=0;y<HORIZON;y++){
    const t = y/HORIZON;
    const r=80+t*100, g=140+t*90, b=220+t*30;
    for(let x=0;x<IW;x++){ const o=(y*IW+x)*4; sd[o]=r; sd[o+1]=g; sd[o+2]=b; sd[o+3]=255; }
  }
  const halfW = IW/2;
  for(let y=HORIZON;y<IH;y++){
    const p = y - HORIZON + 1;
    const worldZ = (CAM_H * FOCAL) / p;          // 이 스캔라인까지 전방 거리
    const scale = worldZ / FOCAL;                // 화면 1px당 월드 px
    // 라인 중앙의 월드 좌표(카트 전방)
    const cx = camX + cosA * worldZ;
    const cy = camY + sinA * worldZ;
    // 화면 오른쪽으로 1px 이동 시 월드 변화(전방의 수직 방향)
    const stepX = -sinA * scale;
    const stepY =  cosA * scale;
    let wx = cx - stepX * halfW;
    let wy = cy - stepY * halfW;
    // 거리감 안개(멀수록 어둡게→밝게 보정)
    const fog = Math.min(1, p/ (IH-HORIZON));
    for(let x=0;x<IW;x++){
      const o = (y*IW+x)*4;
      let r,g,b;
      if(wx<0||wy<0||wx>=MAP||wy>=MAP){ r=55; g=146; b=55; }      // 밖=풀밭
      else { const i=((wy|0)*MAP+(wx|0))*4; r=mapData[i]; g=mapData[i+1]; b=mapData[i+2]; }
      // 안개(지평선쪽으로 하늘색과 블렌딩)
      const f = 1-fog;
      sd[o]   = r*(fog) + 150*f;
      sd[o+1] = g*(fog) + 190*f;
      sd[o+2] = b*(fog) + 235*f;
      sd[o+3] = 255;
      wx += stepX; wy += stepY;
    }
  }
  bctx.putImageData(screenImg,0,0);
  // 태양(하늘 영역에 광택) — heading에 따라 좌우로 살짝 흐름
  const sunX = IW*0.5 - Math.sin(heading)*60, sunY = HORIZON*0.42;
  const g = bctx.createRadialGradient(sunX,sunY,3, sunX,sunY,48);
  g.addColorStop(0,'rgba(255,250,214,0.95)'); g.addColorStop(1,'rgba(255,238,170,0)');
  bctx.fillStyle=g; bctx.beginPath(); bctx.arc(sunX,sunY,48,0,7); bctx.fill();
  bctx.fillStyle='#fff7d6'; bctx.beginPath(); bctx.arc(sunX,sunY,9,0,7); bctx.fill();
}

// 카트 스프라이트(화면 하단 중앙) — 내 색은 멀티 접속 시 배정색
function drawKart(steer){
  const cx = IW/2, cy = IH-24, lean = steer*7, col = net.connected ? net.myColor : '#e23b3b';
  bctx.save(); bctx.translate(cx,cy);
  // 그림자
  bctx.fillStyle='rgba(0,0,0,.32)'; bctx.beginPath(); bctx.ellipse(0,17,32,8,0,0,7); bctx.fill();
  // 뒷바퀴
  bctx.fillStyle='#1a1a1a'; bctx.fillRect(-32,-3,13,19); bctx.fillRect(19,-3,13,19);
  bctx.fillStyle='#333'; bctx.fillRect(-32,-3,13,5); bctx.fillRect(19,-3,13,5);
  // 리어 스포일러
  bctx.fillStyle='#222'; bctx.fillRect(-26+lean*0.3,-18, 52, 5);
  // 차체(사다리꼴 + 명암)
  bctx.fillStyle=col; bctx.beginPath();
  bctx.moveTo(-20+lean*0.4,-15); bctx.lineTo(20+lean*0.4,-15);
  bctx.lineTo(30,15); bctx.lineTo(-30,15); bctx.closePath(); bctx.fill();
  bctx.fillStyle='rgba(255,255,255,.18)'; bctx.beginPath();      // 하이라이트
  bctx.moveTo(-20+lean*0.4,-15); bctx.lineTo(0+lean*0.4,-15); bctx.lineTo(4,15); bctx.lineTo(-30,15); bctx.closePath(); bctx.fill();
  // 헬멧
  bctx.fillStyle='#ffd23f'; bctx.beginPath(); bctx.arc(lean*0.5,-9,9,0,7); bctx.fill();
  bctx.fillStyle='rgba(0,0,0,.35)'; bctx.beginPath(); bctx.ellipse(lean*0.5,-11,7,4,0,0,Math.PI,true); bctx.fill();
  bctx.restore();
}

// ---------- 멀티: 월드 좌표 → 화면 투영(렌더러와 동일한 카메라 모델) ----------
function projectToScreen(px,py){
  const dx=px-state.x, dy=py-state.y;
  const cosA=Math.cos(state.heading), sinA=Math.sin(state.heading);
  const fwd  =  dx*cosA + dy*sinA;     // 카메라 전방 거리
  const side = -dx*sinA + dy*cosA;     // 좌우 오프셋
  if(fwd < 6) return null;             // 뒤/너무 가까움
  const sx = IW/2 + side*FOCAL/fwd;
  const sy = HORIZON + (CAM_H*FOCAL)/fwd;
  if(sy<HORIZON || sy>IH+30) return null;
  return { sx, sy, sc: FOCAL/fwd };
}
function drawPeerKart(p, color, name){
  const w=Math.max(5, 38*p.sc), h=Math.max(4, 30*p.sc);
  bctx.save(); bctx.translate(p.sx, p.sy);
  bctx.fillStyle='rgba(0,0,0,.3)'; bctx.beginPath(); bctx.ellipse(0,2,w*0.55,h*0.18,0,0,7); bctx.fill();
  bctx.fillStyle=color; bctx.fillRect(-w/2,-h, w, h);            // 차체
  bctx.fillStyle='rgba(255,255,255,.85)'; bctx.fillRect(-w*0.26,-h*0.85, w*0.52, h*0.42); // 운전석
  if(p.sc>0.18 && name){                                         // 가까우면 이름표
    bctx.font='6px sans-serif'; bctx.textAlign='center';
    bctx.fillStyle='rgba(0,0,0,.6)'; bctx.fillText(name,0,-h-3);
    bctx.fillStyle='#fff'; bctx.fillText(name,0,-h-3.5);
  }
  bctx.restore();
}
function renderPeers(){
  if(!net.connected) return;
  const list=[];
  net.peers.forEach(p=>{
    if(p.x==null) return;
    const pr=projectToScreen(p.x,p.y);
    if(pr){ pr.color=p.color||'#fff'; pr.name=p.name||''; list.push(pr); }
  });
  list.sort((a,b)=>a.sy-b.sy);                 // 먼 것(지평선쪽) 먼저 → 가까운 게 위에
  list.forEach(pr=> drawPeerKart(pr, pr.color, pr.name));
}

// ---------- 미니맵 ----------
const mini = document.getElementById('mini'), mnctx = mini.getContext('2d');
function drawMini(){
  if(!miniBg) return;
  const s = 96/MAP;
  mnctx.clearRect(0,0,96,96);
  mnctx.drawImage(miniBg,0,0);
  const dot=(x,y,c,r)=>{ mnctx.fillStyle=c; mnctx.beginPath(); mnctx.arc(x*s,y*s,r,0,7); mnctx.fill(); };
  if(net.connected) net.peers.forEach(p=>{ if(p.x!=null) dot(p.x,p.y,p.color||'#fff',2); });
  // 내 위치 + 방향
  const px=state.x*s, py=state.y*s;
  mnctx.strokeStyle='rgba(255,255,255,.9)'; mnctx.lineWidth=1.5; mnctx.beginPath();
  mnctx.moveTo(px,py); mnctx.lineTo(px+Math.cos(state.heading)*7, py+Math.sin(state.heading)*7); mnctx.stroke();
  dot(state.x,state.y, net.connected?net.myColor:'#fff', 3);
  mnctx.strokeStyle='#111'; mnctx.lineWidth=1; mnctx.stroke();
}

// ---------- 게임 상태/물리 ----------
const state = { x:FINISH.x, y:FINISH.y, heading:START_H, speed:0 };
let running=false, mode='tilt';
let lap=1, totalLaps=3, lapStart=0, hitCheck=false, finished=false;
const MAX_SPEED=7.2, ACCEL=0.11, BRAKE=0.17, FRICTION=0.045, TURN=0.058, CURB_CAP=5.4;

function resetRace(){
  state.x=FINISH.x; state.y=FINISH.y; state.heading=START_H; state.speed=0;
  lap=1; hitCheck=false; finished=false; lapStart=performance.now();
}

function updatePhysics(steer, throttle, brake){
  // 가감속 (브레이크는 정지 후 후진까지)
  state.speed += throttle*ACCEL;
  state.speed -= brake*BRAKE;
  if(!throttle && !brake){                        // 마찰: 0을 향해 감쇠(전·후진 모두)
    if(state.speed>0) state.speed = Math.max(0, state.speed-FRICTION);
    else              state.speed = Math.min(0, state.speed+FRICTION);
  }
  state.speed = Math.max(-2.4, Math.min(MAX_SPEED, state.speed));   // 후진 허용
  // 연석 위에선 약간 감속(미끄럼)
  if(surfCode(state.x,state.y)===2 && state.speed>CURB_CAP) state.speed = Math.max(CURB_CAP, state.speed-0.25);
  // 조향: 저속에서도 약간의 권한을 줘서 벽에 박혀도 탈출 가능
  const sp=Math.abs(state.speed);
  state.heading += steer * TURN * Math.min(1, (sp+0.4)/2);

  // 이동 + 가드레일 충돌(벽을 따라 미끄러지거나 튕김)
  const vx = Math.cos(state.heading)*state.speed, vy = Math.sin(state.heading)*state.speed;
  const nx = state.x+vx, ny = state.y+vy;
  if(drivable(nx,ny)){ state.x=nx; state.y=ny; }
  else if(drivable(nx,state.y)){ state.x=nx; state.speed*=0.6; }   // 세로 벽 → 가로로 슬라이드
  else if(drivable(state.x,ny)){ state.y=ny; state.speed*=0.6; }   // 가로 벽 → 세로로 슬라이드
  else { state.speed*=0.25; }                                       // 정면 충돌 → 크게 감속

  // 랩 판정: 체크포인트 통과 후 결승선 부근 재진입
  if(Math.hypot(state.x-CHECK.x, state.y-CHECK.y) < 100) hitCheck = true;
  if(Math.hypot(state.x-FINISH.x, state.y-FINISH.y) < 100 && hitCheck){
    hitCheck=false; lapStart = performance.now();
    if(lap>=totalLaps){ finished=true; } else { lap++; }
  }
}

// ---------- 입력 ----------
const keys={}, touch={ left:false,right:false,gas:false,brake:false };
window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// 기울기
let tiltGamma=0, tiltZero=0, tiltActive=false;
function onOrient(e){ if(e.gamma!=null){ tiltGamma=e.gamma; tiltActive=true; } }
function enableTilt(){
  // iOS 13+ 권한
  if(typeof DeviceOrientationEvent!=='undefined' &&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(s=>{
      if(s==='granted') window.addEventListener('deviceorientation', onOrient);
    }).catch(()=>{});
  } else {
    window.addEventListener('deviceorientation', onOrient);
  }
}
function calibrateTilt(){ tiltZero = tiltGamma; }

// 게임패드
let gpIndex=null;
window.addEventListener('gamepadconnected', e=>{ gpIndex=e.gamepad.index; updateGpStatus(); });
window.addEventListener('gamepaddisconnected', ()=>{ gpIndex=null; updateGpStatus(); });
function updateGpStatus(){
  const el=document.getElementById('gpStatus');
  if(el) el.textContent = '게임패드: ' + (gpIndex!=null?'연결됨 ✅':'미연결');
}

// ---------- 멀티플레이 네트워킹 (WebSocket 중계) ----------
const net = { ws:null, id:null, myColor:'#e23', connected:false, peers:new Map(), sendTimer:null };
function mpConnect(url, room, name, onReady, onErr){
  let ws;
  try { ws = new WebSocket(url); } catch(e){ onErr('주소 형식 오류'); return; }
  net.ws = ws;
  const failTimer = setTimeout(()=>{ if(!net.connected){ try{ws.close();}catch(e){} onErr('연결 시간 초과 (서버 깨어나는 중일 수 있음, 다시 시도)'); } }, 12000);
  ws.onopen = ()=> ws.send(JSON.stringify({ type:'join', room, name }));
  ws.onmessage = (ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if(m.type==='welcome'){
      clearTimeout(failTimer);
      net.id=m.id; net.myColor=m.color||net.myColor; net.connected=true;
      net.peers.clear();
      (m.peers||[]).forEach(p=> net.peers.set(p.id, p));
      onReady();
    } else if(m.type==='peerJoined'){
      net.peers.set(m.id, { id:m.id, name:m.name, color:m.color });
    } else if(m.type==='peerState'){
      const p = net.peers.get(m.id) || { id:m.id };
      Object.assign(p, m.s);                     // x,y,h,sp,lap
      net.peers.set(m.id, p);
    } else if(m.type==='peerLeft'){
      net.peers.delete(m.id);
    } else if(m.type==='full'){
      clearTimeout(failTimer); onErr('방이 가득 찼습니다 (최대 8명)');
    }
  };
  ws.onerror = ()=>{ clearTimeout(failTimer); onErr('연결 실패 (주소 확인)'); };
  ws.onclose = ()=>{ net.connected=false; };
}
function mpStartSending(){
  if(net.sendTimer) clearInterval(net.sendTimer);
  net.sendTimer = setInterval(()=>{
    if(net.connected && net.ws && net.ws.readyState===1){
      net.ws.send(JSON.stringify({ type:'state',
        s:{ x:state.x, y:state.y, h:state.heading, sp:state.speed, lap:lap } }));
    }
  }, 66);  // ~15Hz
}

function readInput(){
  let steer=0, throttle=0, brake=0;
  // 공용: 키보드(데스크톱 테스트)
  if(keys['arrowleft']||keys['a']) steer-=1;
  if(keys['arrowright']||keys['d']) steer+=1;
  if(keys['arrowup']||keys['w']) throttle=1;
  if(keys['arrowdown']||keys['s']) brake=1;

  if(mode==='gamepad' && gpIndex!=null){
    const gp = navigator.getGamepads()[gpIndex];
    if(gp){
      const ax = gp.axes[0]||0; if(Math.abs(ax)>0.15) steer = ax;
      const rt = gp.buttons[7]?gp.buttons[7].value:0;
      const lt = gp.buttons[6]?gp.buttons[6].value:0;
      throttle = Math.max(throttle, rt, gp.buttons[0]&&gp.buttons[0].pressed?1:0);
      brake = Math.max(brake, lt, gp.buttons[1]&&gp.buttons[1].pressed?1:0);
    }
  } else if(mode==='tilt'){
    const g = tiltGamma - tiltZero;
    const dead=3, maxT=30;
    let s = Math.abs(g)<dead ? 0 : (g - Math.sign(g)*dead)/(maxT-dead);
    s = Math.max(-1, Math.min(1, s));
    steer = s;
    // 가속/브레이크는 터치 버튼
    if(touch.gas) throttle=1; if(touch.brake) brake=1;
  } else if(mode==='touch'){
    if(touch.left) steer-=1; if(touch.right) steer+=1;
    if(touch.gas) throttle=1; if(touch.brake) brake=1;
  }
  return { steer:Math.max(-1,Math.min(1,steer)), throttle, brake };
}

// ---------- HUD ----------
const elSpeed=document.getElementById('speedo');
const elLaps=document.getElementById('laps');
const elLapTime=document.getElementById('laptime');
const elStatus=document.getElementById('status');
const elBanner=document.getElementById('banner');
function updateHUD(inp){
  elSpeed.innerHTML = (state.speed<-0.05?'R ':'') + Math.round(Math.abs(state.speed)*30) + '<small> km/h</small>';
  elLaps.innerHTML = (finished?'완주':'LAP '+Math.min(lap,totalLaps)+'/'+totalLaps);
  elLapTime.textContent = ((performance.now()-lapStart)/1000).toFixed(2);
  let m = mode==='gamepad'?'🎮':mode==='tilt'?'📱':'👆';
  let extra = mode==='tilt' ? ('  기울기 '+(tiltGamma-tiltZero).toFixed(0)+'°') :
              mode==='gamepad' ? (gpIndex!=null?'  연결됨':'  미연결') : '';
  if(net.connected) extra += '  🌐'+(net.peers.size+1)+'명';
  elStatus.textContent = m+extra;
  elBanner.classList.toggle('hide', !finished);
}

// ---------- 메인 루프 ----------
function loop(){
  if(running){
    const inp = readInput();
    updatePhysics(inp.steer, inp.throttle, inp.brake);
    renderMode7(state.x, state.y, state.heading);
    renderPeers();
    drawKart(inp.steer);
    // 확대 출력
    dctx.imageSmoothingEnabled=false;
    dctx.drawImage(buf, 0,0,IW,IH, 0,0,display.width,display.height);
    drawMini();
    updateHUD(inp);
  }
  requestAnimationFrame(loop);
}

// ---------- UI 바인딩 ----------
function bindHold(id, key){
  const el=document.getElementById(id);
  const on=e=>{ e.preventDefault(); touch[key]=true; el.classList.add('on'); };
  const off=e=>{ e.preventDefault(); touch[key]=false; el.classList.remove('on'); };
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bindHold('steerL','left'); bindHold('steerR','right');
bindHold('gas','gas'); bindHold('brake','brake');

document.querySelectorAll('.mode').forEach(m=>{
  m.addEventListener('click',()=>{
    document.querySelectorAll('.mode').forEach(x=>x.classList.remove('sel'));
    m.classList.add('sel'); mode=m.dataset.mode;
  });
});

function showControls(){
  // 게임패드 모드면 터치 조향 숨김(가속버튼은 항상 표시)
  document.getElementById('ctlLeft').classList.toggle('hide', mode==='gamepad');
  document.getElementById('ctlRight').classList.toggle('hide', mode==='gamepad');
}

function beginRace(multi){
  if(mode==='tilt') { enableTilt(); setTimeout(calibrateTilt, 300); }
  document.getElementById('menu').classList.add('hide');
  document.getElementById('hud').classList.remove('hide');
  document.getElementById('mini').classList.remove('hide');
  showControls();
  resetRace();
  if(multi && net.id!=null){
    // 출발 라인에서 카트끼리 겹치지 않게 좌우로 살짝 분산
    const lane = (net.id % 4) - 1.5;
    state.x += -Math.sin(state.heading) * lane * 22;
    state.y +=  Math.cos(state.heading) * lane * 22;
    mpStartSending();
  }
  running=true; checkOrient();
}

document.getElementById('startBtn').addEventListener('click', ()=> beginRace(false));

const mpBtn=document.getElementById('mpBtn'), mpStatus=document.getElementById('mpStatus');
const mpRoom=document.getElementById('mpRoom'), mpName=document.getElementById('mpName');
// 서버는 이 페이지를 서빙한 같은 오리진(Render). ?server= 로만 수동 override 가능.
function serverURL(){
  const qp=new URLSearchParams(location.search);
  if(qp.get('server')) return qp.get('server');
  const proto = location.protocol==='https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host;          // 같은 호스트의 WebSocket
}
mpName.value = localStorage.getItem('kartName') || mpName.value;
mpBtn.addEventListener('click', ()=>{
  const url=serverURL(), room=(mpRoom.value.trim()||'room1'), name=(mpName.value.trim()||'Player');
  localStorage.setItem('kartName', name);
  mpBtn.disabled=true; mpStatus.textContent='연결 중… (무료 서버는 첫 접속 시 깨어나는 데 ~30초)';
  mpConnect(url, room, name,
    ()=>{ mpStatus.textContent='연결됨 ✅'; beginRace(true); },
    (err)=>{ mpBtn.disabled=false; mpStatus.textContent='⚠️ '+err; });
});

// secure context 경고
(function(){
  const warn=document.getElementById('warn');
  const secure = window.isSecureContext;
  if(!secure){
    warn.innerHTML='⚠️ 지금 주소는 보안 컨텍스트가 아니라 <b>기울기 센서가 동작하지 않을 수 있어요.</b><br>'+
      'HTTPS 또는 localhost에서 열어 주세요. (게임패드·터치는 정상 동작)';
  }
})();

// ---------- 부팅 ----------
buildTrack();
resize();
updateGpStatus();
requestAnimationFrame(loop);
</script>
